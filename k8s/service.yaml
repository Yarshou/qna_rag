apiVersion: v1
kind: Service
metadata:
  name: qna-rag
  namespace: default
  labels:
    app: qna-rag
spec:
  selector:
    app: qna-rag
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
  # ClusterIP keeps the service internal.
  # For external access, place an Ingress or a LoadBalancer in front
  # and handle TLS termination there (see docs/production.md).
  type: ClusterIP
